services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: sponsor_tracker
      POSTGRES_PASSWORD: sponsor_tracker
      POSTGRES_DB: sponsor_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sponsor_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
